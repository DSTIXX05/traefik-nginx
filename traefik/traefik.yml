global:
  checkNewVersion: false # Don't check for newer Traefik versions
  sendAnonymousUsage: false # Don't send anonymous usage data to Traefik

api:
  dashboard: false

entryPoints:
  web: # Named entry point for HTTP
    address: ":80" # Listen on port 80 (HTTP)
    http:
      redirections:
        entryPoint:
          to: websecure # Redirect TO the "websecure" entry point
          scheme: https # Change scheme to HTTPS
          # Result: ALL HTTP traffic → HTTPS automatically

  websecure: # Named entry point for HTTPS
    address: ":443" # Listen on port 443 (HTTPS/TLS)

tls:
  options:
    default:
      minVersion: VersionTLS12 # Only allow TLS 1.2+ (rejects vulnerable 1.0/1.1)
      sniStrict:
        true # STRICT mode: reject connections if
        # hostname doesn't match certificate
        # (prevents certificate misuse)
  certificates:
    - certFile: /certs/cert.pem # Path to SSL certificate
    keyFile: /certs/key.pem # Path to private key

providers:
  file:
    filename: /traefik/routes.yml
    watch: true

log:
  level: INFO
